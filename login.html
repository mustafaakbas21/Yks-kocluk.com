<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş — YKS Koçluk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/koc-panel.css" />
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(145deg, var(--purple-100) 0%, var(--gray-100) 50%, var(--white) 100%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-200);
    }
    .login-card__brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .login-card__logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--purple-600), var(--purple-700));
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }
    .login-card__title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--purple-700);
    }
    .login-card__sub {
      margin: 0.25rem 0 0;
      font-size: 0.88rem;
      color: var(--gray-500);
    }
    .login-field {
      margin-bottom: 1rem;
    }
    .login-field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 0.35rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--gray-200);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .login-field input:focus {
      outline: none;
      border-color: var(--purple-400);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    .login-error {
      font-size: 0.85rem;
      color: #b91c1c;
      margin-bottom: 1rem;
      display: none;
    }
    .login-error.is-visible { display: block; }
    .login-submit {
      width: 100%;
      padding: 0.85rem;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--purple-600), var(--purple-700));
      color: var(--white);
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .login-submit:hover { opacity: 0.95; }
    .login-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-card__brand">
      <div class="login-card__logo"><i class="fa-solid fa-graduation-cap"></i></div>
      <div>
        <h1 class="login-card__title">YKS Koçluk</h1>
        <p class="login-card__sub">Koç paneline giriş</p>
      </div>
    </div>
    <form id="loginForm">
      <div class="login-field">
        <label for="loginUser">Kullanıcı adı veya e-posta</label>
        <input type="text" id="loginUser" name="loginUser" required autocomplete="username" placeholder="admin" />
      </div>
      <div class="login-field">
        <label for="loginPassword">Şifre</label>
        <input type="password" id="loginPassword" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <p class="login-error" id="loginError" role="alert"></p>
      <button type="submit" class="login-submit" id="loginSubmit">
        <i class="fa-solid fa-right-to-bracket"></i>
        Giriş Yap
      </button>
    </form>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
