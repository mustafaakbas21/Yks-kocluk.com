<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DerecePanel — Süper Uygulama</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-soft: #f4f7f6;
        --text: #2d3436;
        --muted: #636e72;
        --accent: #6c5ce7;
        --accent-dark: #5b4cdb;
        --shadow: 0 12px 40px rgba(108, 92, 231, 0.22);
        --shadow-hover: 0 16px 48px rgba(108, 92, 231, 0.3);
        --radius: 20px;
        --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--text);
        background: linear-gradient(165deg, var(--bg) 0%, var(--bg-soft) 55%, #eef0ff 100%);
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: clamp(32px, 6vw, 64px) 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .brand {
        margin-bottom: 12px;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.6rem, 4vw, 2.1rem);
        font-weight: 800;
        color: var(--text);
      }
      .lead {
        margin: 0 0 40px;
        max-width: 520px;
        line-height: 1.55;
        color: var(--muted);
        font-size: 1.05rem;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        width: 100%;
      }
      .mega-btn {
        flex: 1 1 280px;
        max-width: 420px;
        min-height: 120px;
        padding: 24px 28px;
        border: none;
        border-radius: var(--radius);
        font-size: 1.15rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(145deg, var(--accent) 0%, var(--accent-dark) 100%);
        box-shadow: var(--shadow);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.35;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .mega-btn:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-hover);
      }
      .mega-btn:active {
        transform: translateY(0);
      }
      footer {
        margin-top: 48px;
        font-size: 0.82rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="brand">DerecePanel</p>
      <h1>Süper Uygulama</h1>
      <p class="lead">
        Otonom Soru Kırpıcı otomasyonu ile ücretsiz otonom optik okuyucuyu tek çatı altında kullanın.
        Başlamak için bir modül seçin.
      </p>
      <div class="actions">
        <a class="mega-btn" href="./src/koc-havuzu/index.html">🚀 Otonom Soru Havuzu (Kırpıcı)</a>
        <a class="mega-btn" href="./src/optik-okuyucu/index.html">🤖 Otonom Optik Okuyucu</a>
      </div>
      <footer>Açık tema · Lila vurgu (#6c5ce7)</footer>
    </div>
  </body>
</html>
